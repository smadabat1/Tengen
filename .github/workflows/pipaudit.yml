name: pip-audit Dependency Scan

on:
  push:
    branches: ["main"]
    paths:
      - "**/requirements*.txt"
      - "**/pyproject.toml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/requirements*.txt"
      - "**/pyproject.toml"
  schedule:
    - cron: "0 6 * * *" # daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  pip-audit:
    name: pip-audit CVE Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: |
          # ← adjust path to your requirements.txt if it's inside a subfolder e.g. backend/requirements.txt
          pip install -r backend/requirements.txt
        continue-on-error: true # don't fail if some deps have conflicts during install

      # --- JSON report (for artifact) ---
      - name: Run pip-audit (JSON report)
        run: |
          pip-audit \
            --requirement backend/requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --exit-zero  # don't fail here, let the summary step do it

      - name: Upload JSON report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report-${{ github.run_number }}
          path: pip-audit-report.json
          retention-days: 30

      # --- Human readable summary in Actions UI ---
      - name: Run pip-audit (summary output)
        run: |
          echo "## pip-audit Dependency Scan Results" >> $GITHUB_STEP_SUMMARY
          pip-audit \
            --requirement backend/requirements.txt \
            --format columns \
            >> $GITHUB_STEP_SUMMARY 2>&1 || true

      # --- Fail the build if any CVEs are found ---
      - name: Fail on vulnerabilities
        run: |
          pip-audit \
            --requirement backend/requirements.txt