name: Bandit Python Security Scan

on:
  push:
    branches: ["main"]
    paths:
      - "**.py"
  pull_request:
    branches: ["main"]
    paths:
      - "**.py"
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

# Fix for error #3 and #4 — explicitly grant security-events write permission
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  bandit:
    name: Bandit SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml] bandit-sarif-formatter

      # Fix for error #1 — --exit-zero ensures the file is always created
      - name: Run Bandit (SARIF)
        run: |
          bandit -r . \
            -f sarif \
            -o bandit-sarif.json \
            --exclude "./.venv,./venv,./tests,./node_modules" \
            --severity-level medium \
            --confidence-level medium \
            --exit-zero

      # Fix for error #5 — upgraded to codeql-action@v4
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-sarif.json
          category: bandit

      # Fix for error #2 — --exit-zero ensures the file is always created
      - name: Run Bandit (HTML report)
        run: |
          bandit -r . \
            -f html \
            -o bandit-report.html \
            --exclude "./.venv,./venv,./tests,./node_modules" \
            --severity-level medium \
            --confidence-level medium \
            --exit-zero

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-${{ github.run_number }}
          path: bandit-report.html
          retention-days: 30

      # Fail the build only on HIGH severity findings
      - name: Fail on HIGH severity issues
        run: |
          bandit -r . \
            --exclude "./.venv,./venv,./tests,./node_modules" \
            --severity-level high \
            --confidence-level high