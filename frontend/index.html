<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Tengen — Self-hosted password manager" />
    <title>Tengen</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- Anti-FOUC: Apply saved theme before React mounts -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('tengen_theme') || 'obsidian';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
